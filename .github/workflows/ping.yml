name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 */6 * * *'  # 6시간마다 (0시, 6시, 12시, 18시 UTC)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping DB via API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://cycle-tracker-puce.vercel.app/api/ping)
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "Ping failed with status $response"
            exit 1
          fi
